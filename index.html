<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>2048 AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <div class="background-animation"></div>

  <div class="wrapper">
    <header class="header">
      <div class="header-content">
        <h1 class="title">2048</h1>

        <div class="stat-container">
          <div class="stat-grid">
            <div class="stat">
              <small>SCORE</small>
              <span id="score">0</span>
            </div>
            <div class="stat">
              <small>BEST</small>
              <span id="best">0</span>
            </div>
          </div>
          <div class="stat-grid second-row">
            <div class="stat">
              <small>MOVES</small>
              <span id="moves">0</span>
            </div>
            <div class="stat">
              <small>TIME</small>
              <span id="time">0:00</span>
            </div>
          </div>
        </div>
      </div>

      <div class="controls-row">
        <p class="subtitle">Join the numbers and get to the <strong>2048 tile!</strong></p>
        <div class="btn-group">
          <button id="btn-undo" class="btn btn-secondary" title="Undo Move">↩ Undo</button>
          <button id="btn-restart" class="btn" title="Restart Game">↻ Restart</button>
          <button id="btn-settings" class="btn btn-icon" title="Settings">⚙️</button>
        </div>
      </div>
    </header>

    <main class="game-container">
      <div class="board-wrapper">
        <div id="board" class="board">
          <!-- Grid cells will be injected here -->
          <div id="grid-bg" class="grid-bg"></div>
          <!-- Tiles will be injected here -->
          <div id="tile-container" class="tile-container"></div>

          <!-- Game Over / Win Message Overlay -->
          <div id="game-message" class="game-message hidden">
            <h2 id="message-title">Game Over!</h2>
            <div class="message-actions">
              <button id="btn-keep-playing" class="btn btn-secondary hidden">Keep Playing</button>
              <button id="btn-try-again" class="btn">Try Again</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Settings Modal overlay -->
      <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
          <h2>Settings</h2>
          <div class="settings-group">
            <label>Grid Size</label>
            <div class="toggle-btns size-options">
              <button class="btn btn-toggle active" data-size="4">4x4</button>
              <button class="btn btn-toggle" data-size="5">5x5</button>
            </div>
          </div>
          <div class="settings-group">
            <label>Auto-Play (AI)</label>
            <button id="btn-ai-toggle" class="btn btn-toggle">Off</button>
          </div>
          <button id="btn-close-settings" class="btn btn-full">Close</button>
        </div>
      </div>
    </main>
    <footer class="instructions">
      <p><strong>HOW TO PLAY:</strong> Use your <strong>arrow keys</strong>, <strong>WASD</strong>, or
        <strong>swipe</strong> to move the tiles. Tiles with the same number merge into one when they touch. Add them up
        to reach <strong>2048!</strong>
      </p>
    </footer>
  </div>

  <script type="module" src="js/main.js"></script>
</body>

</html>
